<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>שיווק — ניהול משלוחים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --blue:#1f4e78; --blue2:#2e6da4; --bg:#f4f6fa; --card:#fff; --line:#e3e8f0;
  --green:#1e7e34; --red:#c00000; --gold:#b8860b; --text:#1a2233; --muted:#7a8699;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;width:100%;background:#fff}
input:focus,select:focus,textarea:focus{outline:2px solid var(--blue2);border-color:transparent}
label{font-size:13px;font-weight:500;color:var(--muted);display:block;margin-bottom:4px}

/* ---------- login ---------- */
#login{position:fixed;inset:0;background:linear-gradient(135deg,#1f4e78,#153450);display:flex;align-items:center;justify-content:center;z-index:100}
#login .box{background:#fff;border-radius:18px;padding:36px 32px;width:min(360px,92vw);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)}
#login h1{font-size:26px;color:var(--blue);margin-bottom:4px}
#login p{color:var(--muted);font-size:14px;margin-bottom:20px}
#login input{text-align:center;font-size:18px;margin-bottom:12px}
#login button{width:100%;background:var(--blue);color:#fff;border:0;border-radius:9px;padding:12px;font-size:16px;font-weight:700}
#login .err{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}

/* ---------- topbar & nav ---------- */
header{background:var(--blue);color:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.hrow{display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto}
header h1{font-size:20px;font-weight:900}
header .sub{font-size:11px;opacity:.75}
#syncState{font-size:12px;opacity:.85;display:flex;align-items:center;gap:6px}
nav{display:flex;gap:4px;max-width:1100px;margin:10px auto 0;overflow-x:auto}
nav button{background:transparent;border:0;color:#cfe0f2;padding:10px 16px;font-size:14px;font-weight:500;border-radius:10px 10px 0 0;white-space:nowrap}
nav button.on{background:var(--bg);color:var(--blue);font-weight:700}
main{max-width:1100px;margin:0 auto;padding:18px 14px 60px}

/* ---------- cards ---------- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--line);box-shadow:0 2px 8px rgba(31,78,120,.06)}
.kpi .lbl{font-size:12px;color:var(--muted);font-weight:500}
.kpi .val{font-size:24px;font-weight:900;color:var(--blue);margin-top:4px}
.kpi.warn .val{color:var(--red);font-size:18px}
.card{background:var(--card);border-radius:14px;padding:18px;border:1px solid var(--line);box-shadow:0 2px 8px rgba(31,78,120,.06);margin-bottom:16px}
.card h2{font-size:16px;color:var(--blue);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}

/* ---------- table ---------- */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#eef3f9;color:var(--blue);font-weight:700;padding:9px 10px;text-align:right;white-space:nowrap}
td{padding:9px 10px;border-top:1px solid var(--line);white-space:nowrap}
tr:hover td{background:#f7fafd}
.money{font-weight:700;color:var(--green)}
.money.neg{color:var(--red)}
.tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700}
.tag.b{background:#ddebf7;color:var(--blue)}
.tag.g{background:#e2efda;color:var(--green)}
.tag.r{background:#fde7e7;color:var(--red)}
.tag.o{background:#fff2cc;color:var(--gold)}
.rowbtn{border:0;background:#eef3f9;border-radius:8px;padding:5px 9px;font-size:13px;margin-inline-start:4px}
.rowbtn:hover{background:#ddebf7}

/* ---------- form ---------- */
.frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:12px}
.btn{background:var(--blue);color:#fff;border:0;border-radius:10px;padding:12px 26px;font-size:15px;font-weight:700}
.btn:hover{background:var(--blue2)}
.btn.sec{background:#eef3f9;color:var(--blue)}
.btn.danger{background:#fde7e7;color:var(--red)}
.gbcalc{background:#f7fafd;border:1px dashed var(--blue2);border-radius:12px;padding:14px;margin-bottom:12px}
.gbline{display:grid;grid-template-columns:1fr 90px 110px;gap:8px;margin-bottom:8px;align-items:center}
.gbline .sum{font-weight:700;text-align:center;color:var(--green)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 14px;font-size:13px}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.note{font-size:12px;color:var(--muted)}
.empty{text-align:center;padding:40px;color:var(--muted)}
#toast{position:fixed;bottom:24px;right:50%;transform:translateX(50%);background:var(--text);color:#fff;padding:12px 22px;border-radius:12px;font-size:14px;display:none;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.custcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-bottom:18px}
.cc{background:var(--card);border-radius:14px;border:1px solid var(--line);padding:16px;border-top:4px solid var(--blue2)}
.cc h3{font-size:15px;color:var(--blue)}
.cc .big{font-size:21px;font-weight:900;margin:6px 0 2px}
.cc .note{font-size:12.5px}
@media(max-width:600px){ header h1{font-size:17px} .kpi .val{font-size:19px} td,th{padding:7px 7px;font-size:13px} }
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <h1>📦 שיווק</h1>
    <p>ניהול משלוחים ומכירות סיטונאיות</p>
    <input type="password" id="pw" placeholder="סיסמה" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">כניסה</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<header>
  <div class="hrow">
    <div><h1>📦 שיווק — ניהול משלוחים</h1><div class="sub">מכירות סיטונאיות</div></div>
    <div id="syncState"></div>
  </div>
  <nav id="nav"></nav>
</header>
<main id="main"></main>
<div id="toast"></div>

<script>
/* ================= CONFIG ================= */
const APP_PW_HASH = '7336d9ead196fe8ac03a3c003144eea8d119040dca54285735074793d4067af9'; // sha256('shivuk|<סיסמה>') — הסיסמה עצמה לא בקוד
// כתובת ה-Apps Script מוצפנת עם הסיסמה — נפתחת אוטומטית בכניסה, בלי הגדרה ידנית בכל מכשיר
const GS_ENC = 'aa4f5102ed5d188f6541cf4e2c81eecb883d877d8829811cdbb802935ef4f0943bff0d010f46f7fe8e555018e64f528f9b365b2b42fe2f6c4a2f2b1eff957f0c4e53ef294b2485670e4195564eba309621b78c1f1d32c3bc2b9bd64836445dc2c8a415e42a0f3ed383c8fbc37017c3254e31';
let GS_URL = '';                              // כתובת ה-Apps Script — מוגדרת במסך הגדרות
const SHEET_SHIP = 'משלוחים', SHEET_PRICE = 'מחירון', SHEET_PAY = 'תשלומים', SHEET_EXP = 'הוצאות';
const PAY_METHODS = ['מזומן','העברה בנקאית',"צ'ק",'אחר'];
const EXP_CATS = ['משלוח','אריזה','נסיעות','עמלות','אחר'];
const CUSTOMERS_DEFAULT = [];   // הלקוחות נטענים מהנתונים בגיליון
const TYPES = ['ברכסוני','העברת GB','חזרה','אחר'];

/* ================= STATE ================= */
const DB = { shipments:[], prices:[], payments:[], expenses:[] };
let page = 'home', editId = null, editPayId = null, editPriceId = null, custFilter = '', typeFilter = '';
let _gbItems = null; // שורות המוצרים מהמחשבון (נשמרות על המשלוח לחישוב רווח לפי מוצר)

/* ================= HELPERS ================= */
const $ = s => document.querySelector(s);
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.style.display='block'; clearTimeout(t._h); t._h=setTimeout(()=>t.style.display='none',2600); }
function uiConfirm(msg, okLabel){ // דיאלוג מעוצב במקום confirm של הדפדפן
  return new Promise(res=>{
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;background:rgba(15,25,40,.45);z-index:90;display:flex;align-items:center;justify-content:center';
    ov.innerHTML=`<div style="background:#fff;border-radius:16px;padding:24px;width:min(340px,90vw);text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.3)">
      <div style="font-size:15px;margin-bottom:18px;line-height:1.5">${msg}</div>
      <button class="btn danger" data-x="1">${okLabel||'מחק'}</button>
      <button class="btn sec" style="margin-inline-start:8px">ביטול</button></div>`;
    document.body.appendChild(ov);
    const done=v=>{ov.remove();res(v);};
    ov.querySelector('[data-x]').onclick=()=>done(true);
    ov.querySelector('.btn.sec').onclick=()=>done(false);
    ov.onclick=e=>{ if(e.target===ov) done(false); };
    document.addEventListener('keydown',function esc(e){ if(e.key==='Escape'){document.removeEventListener('keydown',esc);done(false);} });
  });
}
function fmtM(n){ if(n===''||n==null||isNaN(n)) return '—'; return Math.round(+n).toLocaleString('he-IL')+' ₪'; }
function fmtN(n){ if(n===''||n==null||isNaN(n)) return '—'; return (+n).toLocaleString('he-IL'); }
function stripApos(v){ return (typeof v==='string' && v.startsWith("'")) ? v.slice(1) : v; }
function fmtD(d){ d=String(stripApos(d)).slice(0,10); const p=d.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0].slice(2)}`:d; }
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function customers(){ const set=new Set(CUSTOMERS_DEFAULT); DB.shipments.forEach(s=>s.customer&&set.add(s.customer)); DB.payments.forEach(p=>p.customer&&set.add(p.customer)); return [...set]; }
function paidOf(c){ return DB.payments.filter(p=>!c||p.customer===c).reduce((a,p)=>a+(+p.amount||0),0); }
// שורת מחירון ברכסוני המתאימה ללקוח (למשל "ברכסוני גוטסמן" → כל לקוח שמכיל "גוטסמן")
function brxPriceRow(customer){
  const c=String(customer||'');
  return DB.prices.find(p=>{ const n=String(p.product); if(!n.includes('ברכסוני')) return false;
    const kw=n.replace(/ברכסוני/g,'').trim(); return kw && (c.includes(kw)||kw.includes(c)); })
    || DB.prices.find(p=>String(p.product).trim()==='ברכסוני'); // נפילה חזרה לשורת ברכסוני יחידה
}
// עלות משלוח: עלות מפורשת אם קיימת, אחרת גזורה מהמחירון (ברכסוני = כמות × עלות ליח'). null = לא ידוע
function shipCost(s){
  if(s.cost!=='') return s.cost;
  if(s.type==='ברכסוני'){ const p=brxPriceRow(s.customer); if(p && p.cost!=='') return s.units*p.cost; }
  return null;
}
function tagCls(t){ return t==='ברכסוני'?'b':t==='העברת GB'?'g':t==='חזרה'?'r':'o'; }

/* ================= API (Google Apps Script) ================= */
function gsUrl(){ return localStorage.getItem('shivuk_gs') || GS_URL; }
async function apiGet(params){
  const r = await fetch(gsUrl()+'?'+new URLSearchParams(params), {method:'GET'});
  return r.json();
}
async function apiPost(params){
  const r = await fetch(gsUrl(), {method:'POST', body:new URLSearchParams(params)});
  return r.json();
}
function setSync(state){
  $('#syncState').innerHTML = state==='ok' ? '🟢 מסונכרן'
    : state==='load' ? '⏳ טוען…' : state==='save' ? '⏳ שומר…'
    : state==='nocfg' ? '⚙️ נדרשת הגדרה' : '🔴 שגיאה';
}

async function loadAll(){
  if(!gsUrl()){ setSync('nocfg'); if(page==='home') nav('settings'); return; }
  setSync('load');
  try{
    const [ships, prices, pays, exps] = await Promise.all([
      apiGet({action:'getTable', sheet:SHEET_SHIP}),
      apiGet({action:'getTable', sheet:SHEET_PRICE}),
      apiGet({action:'getTable', sheet:SHEET_PAY}),
      apiGet({action:'getTable', sheet:SHEET_EXP}),
    ]);
    DB.shipments = (ships.rows||[]).map(r=>({ ...r, date:stripApos(r.date), units:+r.units||0,
      amount:(r.amount===''||r.amount==null)?'':+r.amount,
      cost:(r.cost===''||r.cost==null)?'':+r.cost,
      items:(()=>{ try{ const a=JSON.parse(r.items); return Array.isArray(a)&&a.length?a:null; }catch(e){ return null; } })() }));
    DB.prices = (prices.rows||[]).map(r=>({ ...r, price:(r.price===''||r.price==null)?'':+r.price,
      cost:(r.cost===''||r.cost==null)?'':+r.cost }));
    DB.payments = (pays.rows||[]).map(r=>({ ...r, date:stripApos(r.date), amount:+r.amount||0 }));
    DB.expenses = (exps.rows||[]).map(r=>({ ...r, date:stripApos(r.date), amount:+r.amount||0 }));
    DB.shipments.sort((a,b)=> String(b.date).localeCompare(String(a.date)));
    DB.payments.sort((a,b)=> String(b.date).localeCompare(String(a.date)));
    DB.expenses.sort((a,b)=> String(b.date).localeCompare(String(a.date)));
    setSync('ok'); render();
  }catch(e){ console.error(e); setSync('err'); toast('שגיאה בטעינה — בדוק את כתובת ה-Apps Script בהגדרות'); }
}

async function saveRow(sheet, data){
  setSync('save');
  const res = await apiPost({action:'saveRow', sheet, data:JSON.stringify(data)});
  setSync('ok');
  return res;
}
async function deleteRow(sheet, id){
  setSync('save');
  const res = await apiPost({action:'deleteRow', sheet, id});
  setSync('ok');
  return res;
}

/* ================= LOGIN ================= */
function sha256bytes(bytes){ // מימוש עצמאי — ל-HTTP שבו crypto.subtle לא זמין
  const rr=(v,c)=>((v>>>c)|(v<<(32-c)))>>>0;
  const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  let H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  const l=bytes.length, total=Math.ceil((l+9)/64)*64, data=new Uint8Array(total);
  data.set(bytes); data[l]=0x80;
  const dv=new DataView(data.buffer);
  dv.setUint32(total-4,(l*8)>>>0); dv.setUint32(total-8,Math.floor(l*8/4294967296));
  const w=new Uint32Array(64);
  for(let i=0;i<total;i+=64){
    for(let j=0;j<16;j++) w[j]=dv.getUint32(i+j*4);
    for(let j=16;j<64;j++){
      const s0=rr(w[j-15],7)^rr(w[j-15],18)^(w[j-15]>>>3);
      const s1=rr(w[j-2],17)^rr(w[j-2],19)^(w[j-2]>>>10);
      w[j]=(w[j-16]+s0+w[j-7]+s1)>>>0;
    }
    let [a,b,c,d,e,f,g,h]=H;
    for(let j=0;j<64;j++){
      const S1=rr(e,6)^rr(e,11)^rr(e,25), ch=(e&f)^(~e&g), t1=(h+S1+ch+K[j]+w[j])>>>0;
      const S0=rr(a,2)^rr(a,13)^rr(a,22), maj=(a&b)^(a&c)^(b&c), t2=(S0+maj)>>>0;
      h=g;g=f;f=e;e=(d+t1)>>>0;d=c;c=b;b=a;a=(t1+t2)>>>0;
    }
    H=[(H[0]+a)>>>0,(H[1]+b)>>>0,(H[2]+c)>>>0,(H[3]+d)>>>0,(H[4]+e)>>>0,(H[5]+f)>>>0,(H[6]+g)>>>0,(H[7]+h)>>>0];
  }
  return H.map(x=>x.toString(16).padStart(8,'0')).join('');
}
async function sha256hex(s){
  const bytes = new TextEncoder().encode(s);
  if(crypto.subtle){
    const b = await crypto.subtle.digest('SHA-256', bytes);
    return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  return sha256bytes(bytes);
}
async function decryptGs(pw){ // פענוח כתובת השרת מהבלוב המוצפן, בעזרת הסיסמה
  const enc = GS_ENC.match(/../g).map(h=>parseInt(h,16));
  const out = new Uint8Array(enc.length);
  for(let i=0; i<enc.length; i+=32){
    const ks = (await sha256hex('shivukenc|'+pw+'|'+(i/32))).match(/../g).map(h=>parseInt(h,16));
    for(let j=0; j<32 && i+j<enc.length; j++) out[i+j] = enc[i+j] ^ ks[j];
  }
  const url = new TextDecoder().decode(out);
  return url.startsWith('https://') ? url : null;
}
async function doLogin(){
  const pw = $('#pw').value;
  const h = await sha256hex('shivuk|'+pw);
  if(h===APP_PW_HASH){
    const url = await decryptGs(pw);
    if(url) localStorage.setItem('shivuk_gs', url);
    localStorage.setItem('shivuk_auth','1'); boot();
  }
  else $('#loginErr').textContent='סיסמה שגויה';
}
function boot(){ $('#login').style.display='none'; renderNav(); render(); loadAll(); }

/* ================= NAV ================= */
const PAGES = [ ['home','📊 סיכום'], ['add','➕ משלוח חדש'], ['list','📋 כל המשלוחים'], ['pay','💰 תשלומים'], ['profit','📈 רווחים'], ['prices','🏷️ מחירון'], ['settings','⚙️'] ];
function renderNav(){
  $('#nav').innerHTML = PAGES.map(([id,l])=>`<button class="${page===id?'on':''}" onclick="nav('${id}')">${l}</button>`).join('');
}
function nav(p){ page=p; if(p!=='add') editId=null; if(p!=='pay') editPayId=null; renderNav(); render(); }

/* ================= RENDER ================= */
function render(){
  const m = $('#main');
  if(page==='home') m.innerHTML = viewHome();
  else if(page==='add') m.innerHTML = viewAdd();
  else if(page==='list') m.innerHTML = viewList();
  else if(page==='pay') m.innerHTML = viewPay();
  else if(page==='profit') m.innerHTML = viewProfit();
  else if(page==='prices') m.innerHTML = viewPrices();
  else if(page==='settings') m.innerHTML = viewSettings();
  if(page==='home') drawChart();
  if(page==='add') gbCalcInit();
}

/* ---------- home ---------- */
function sums(rows){
  let u=0,m=0; rows.forEach(s=>{ u+=s.units||0; if(s.amount!=='') m+=s.amount||0; });
  return {u,m};
}
function viewHome(){
  if(!DB.shipments.length){
    return `<div class="card"><div class="empty">
      אין עדיין נתונים.<br><br>
      ${gsUrl() ? `<button class="btn" onclick="nav('add')">➕ הוספת משלוח ראשון</button>` : `<button class="btn" onclick="nav('settings')">⚙️ להגדרת החיבור לגוגל</button>`}
    </div></div>`;
  }

let chartObj=null;
function drawChart(){
  if(typeof Chart==='undefined' || !$('#chart')) return;
  const byMonth={};
  DB.shipments.forEach(s=>{
    const m=String(s.date).slice(0,7); if(!m) return;
    byMonth[m]=byMonth[m]||{b:0,g:0};
    const v=(s.amount===''?0:+s.amount);
    if(s.type==='ברכסוני') byMonth[m].b+=v; else byMonth[m].g+=v;
  });
  const keys=Object.keys(byMonth).sort();
  const lbl=keys.map(k=>{const[y,mo]=k.split('-');return mo+'/'+y.slice(2);});
  if(chartObj) chartObj.destroy();
  chartObj=new Chart($('#chart'),{type:'bar',
    data:{labels:lbl,datasets:[
      {label:'ברכסוני',data:keys.map(k=>byMonth[k].b),backgroundColor:'#2e6da4'},
      {label:'העברות GB',data:keys.map(k=>byMonth[k].g),backgroundColor:'#70ad47'}]},
    options:{plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true},y:{stacked:true}},responsive:true}});
}

function autoCost(){ // עלות אוטומטית לברכסוני לפי המחירון של הלקוח (כמות × עלות ליחידה)
  const c=$('#f-cost'); if(!c || ($('#f-type')?.value)!=='ברכסוני') return;

  const p=brxPriceRow($('#f-cust')?.value||'');
  const u=+($('#f-units')?.value||0);
  if(p && p.cost!=='' && u){ c.value=u*p.cost; c.dataset.auto='1'; }
}
function gbPriced(){ return DB.prices.filter(p=>p.price!=='' && !String(p.product).includes('ברכסוני')); }
function gbCalcHtml(){
  const priced = gbPriced();
  if(!priced.length) return '';
  return `<div class="gbcalc"><b style="font-size:14px">🧮 מחשבון GB — הזן כמויות והסכום יחושב לבד</b><br><br>
    ${priced.map((p,i)=>`<div class="gbline">
      <span style="font-size:14px">${esc(p.product)} <span class="note">(${fmtM(p.price)})</span></span>
      <input type="number" min="0" id="gbq-${i}" oninput="gbCalc()" placeholder="0">
      <span class="sum" id="gbs-${i}"></span></div>`).join('')}
    <div style="text-align:left;font-weight:900;color:var(--blue)" id="gb-total"></div></div>`;
}
function gbCalc(){
  const priced = gbPriced();
  let total=0, units=0, cost=0, costMissing=false;
  const items=[];
  priced.forEach((p,i)=>{
    const q=+($('#gbq-'+i)?.value||0);
    const s=q*p.price; total+=s; units+=q;
    if(q){ items.push({p:p.product, q, sp:p.price, cp:p.cost===''?null:p.cost});
      if(p.cost==='') costMissing=true; else cost+=q*p.cost; }
    const el=$('#gbs-'+i); if(el) el.textContent = q? fmtM(s):'';
  });
  $('#gb-total').textContent = units? `סה"כ: ${fmtN(units)} יח' · ${fmtM(total)}${costMissing?' (חסרה עלות קנייה לחלק מהמוצרים במחירון)':''}` : '';
  if(units){
    $('#f-units').value=units; $('#f-amount').value=total;
    _gbItems=items;
    if(!costMissing){ $('#f-cost').value=cost; $('#f-cost').dataset.auto='1'; }
  }
}

/* ---------- profit & expenses ---------- */
function profitData(){
  let revenue=0, goods=0, noCost=0;
  DB.shipments.forEach(s=>{
    if(s.amount!=='') revenue+=s.amount;
    const c=shipCost(s);
    if(c!=null) goods+=c; else if(s.amount!=='' && s.amount!==0) noCost++;
  });
  const expenses = DB.expenses.reduce((a,e)=>a+e.amount,0);
  return { revenue, goods, gross:revenue-goods, expenses, net:revenue-goods-expenses, noCost };
}
function productProfit(){ // רווח לפי מוצר — מברכסוני (לפי המשלוח) ומפירוט המחשבון
  const map={};
  const add=(name,q,rev,cost,costKnown)=>{
    const m=map[name]=map[name]||{q:0,rev:0,cost:0,unknown:false};
    m.q+=q; m.rev+=rev; if(costKnown) m.cost+=cost; else m.unknown=true;
  };
  DB.shipments.forEach(s=>{
    if(s.type==='ברכסוני'){
      const c=shipCost(s), row=brxPriceRow(s.customer);
      const label = row ? row.product : 'ברכסוני';
      add(label, s.units, s.amount===''?0:s.amount, c==null?0:c, c!=null);
    } else if(s.items){
      s.items.forEach(it=> add(it.p, it.q, it.q*(it.sp||0), it.q*(it.cp||0), it.cp!=null));
    }
  });
  return Object.entries(map).map(([name,m])=>({name,...m, profit:m.rev-m.cost}));
}
function viewProfit(){
  const d = profitData();
  const prods = productProfit();
  const today = new Date().toISOString().slice(0,10);
  // פירוק חודשי
  const months={};
  DB.shipments.forEach(s=>{ const m=String(s.date).slice(0,7); if(!m)return;
    months[m]=months[m]||{rev:0,goods:0,exp:0};
    if(s.amount!=='') months[m].rev+=s.amount;
    const c=shipCost(s); if(c!=null) months[m].goods+=c; });
  DB.expenses.forEach(e=>{ const m=String(e.date).slice(0,7); if(!m)return;
    months[m]=months[m]||{rev:0,goods:0,exp:0}; months[m].exp+=e.amount; });
  const mkeys=Object.keys(months).sort().reverse();
  return `
  <div class="kpis">
    <div class="kpi"><div class="lbl">הכנסות</div><div class="val">${fmtM(d.revenue)}</div></div>
    <div class="kpi"><div class="lbl">עלות סחורה</div><div class="val">${fmtM(d.goods)}</div></div>
    <div class="kpi"><div class="lbl">רווח גולמי</div><div class="val" style="color:var(--green)">${fmtM(d.gross)}</div></div>
    <div class="kpi"><div class="lbl">הוצאות</div><div class="val" style="color:var(--red)">${fmtM(d.expenses)}</div></div>
    <div class="kpi"><div class="lbl">רווח נקי</div><div class="val" style="color:${d.net>=0?'var(--green)':'var(--red)'}">${fmtM(d.net)}</div></div>
  </div>
  ${d.noCost?`<div class="card" style="border-color:var(--gold)"><b>⚠️ ${d.noCost} משלוחים בלי עלות קנייה</b> — הרווח האמיתי נמוך מהמוצג. ערוך אותם ב"כל המשלוחים" והוסף עלות, או הוסף עלויות במחירון ואעדכן.</div>`:''}

  <div class="card"><h2>➖ הוספת הוצאה</h2>
  <div class="frow">
    <div><label>תאריך</label><input type="date" id="e-date" value="${today}"></div>
    <div><label>קטגוריה</label><input list="dl-expcat" id="e-cat" placeholder="משלוח / אריזה / ...">
      <datalist id="dl-expcat">${EXP_CATS.map(c=>`<option value="${c}">`).join('')}</datalist></div>
    <div><label>סכום (₪)</label><input type="number" id="e-amount"></div>
    <div><label>הערות</label><input id="e-notes"></div>
  </div>
  <button class="btn" onclick="submitExpense()">💾 שמור הוצאה</button></div>

  <div class="card"><h2>📦 רווח לפי מוצר</h2>
  <div class="twrap"><table><tr><th>מוצר</th><th>יח' שנמכרו</th><th>הכנסות</th><th>עלות</th><th>רווח</th></tr>
  ${prods.map(p=>`<tr><td style="white-space:normal">${esc(p.name)}</td><td>${fmtN(p.q)}</td>
    <td class="money">${fmtM(p.rev)}</td><td>${p.unknown?'<span class="tag o">חלקי</span> ':''}${fmtM(p.cost)}</td>
    <td class="money ${p.profit<0?'neg':''}">${p.unknown?'—':fmtM(p.profit)}</td></tr>`).join('')
    || '<tr><td colspan="5" class="empty">אין עדיין נתוני מוצרים — משלוחי GB שיוזנו דרך המחשבון יופיעו כאן</td></tr>'}
  </table></div>
  <p class="note">משלוחי GB נספרים לפי מוצר רק אם הוזנו דרך המחשבון. "חלקי" = חסרה עלות לחלק מהיחידות.</p></div>

  <div class="card"><h2>📅 לפי חודש</h2>
  <div class="twrap"><table><tr><th>חודש</th><th>הכנסות</th><th>עלות סחורה</th><th>הוצאות</th><th>רווח נקי</th></tr>
  ${mkeys.map(m=>{ const x=months[m]; const net=x.rev-x.goods-x.exp; const[y,mo]=m.split('-');
    return `<tr><td><b>${mo}/${y.slice(2)}</b></td><td class="money">${fmtM(x.rev)}</td>
    <td>${fmtM(x.goods)}</td><td>${fmtM(x.exp)}</td>
    <td class="money ${net<0?'neg':''}">${fmtM(net)}</td></tr>`;}).join('')}
  </table></div></div>

  <div class="card"><h2>🧾 הוצאות (${DB.expenses.length})</h2>
  <div class="twrap"><table><tr><th>תאריך</th><th>קטגוריה</th><th>סכום</th><th>הערות</th><th></th></tr>
  ${DB.expenses.map(e=>`<tr><td>${fmtD(e.date)}</td><td>${esc(e.category||'')}</td>
    <td class="money neg">${fmtM(e.amount)}</td><td style="white-space:normal;max-width:240px">${esc(e.notes||'')}</td>
    <td><button class="rowbtn" onclick="delExpense('${e.id}')">🗑️</button></td></tr>`).join('')
    || '<tr><td colspan="5" class="empty">עדיין לא נרשמו הוצאות</td></tr>'}
  </table></div></div>`;
}
async function submitExpense(){
  const date=$('#e-date').value, amount=$('#e-amount').value;
  if(!date||amount===''){ toast('חסר תאריך או סכום'); return; }
  try{
    await saveRow(SHEET_EXP,{ id:Date.now(), date:"'"+date, category:$('#e-cat').value.trim(),
      amount:+amount, notes:$('#e-notes').value.trim() });
    toast('ההוצאה נשמרה ✔'); await loadAll(); nav('profit');
  }catch(e){ setSync('err'); toast('שגיאה בשמירה'); }
}
async function delExpense(id){
  const e=DB.expenses.find(x=>String(x.id)===String(id));
  if(!await uiConfirm(`למחוק הוצאה של <b>${fmtM(e.amount)}</b>?`)) return;
  try{ await deleteRow(SHEET_EXP,id); toast('נמחק'); await loadAll(); }
  catch(err){ setSync('err'); toast('שגיאה במחיקה'); }
}

/* ---------- settings ---------- */
function viewSettings(){
  return `<div class="card"><h2>⚙️ הגדרות</h2>
  <label>כתובת ה-Apps Script (מסתיימת ב-/exec)</label>
  <input id="set-gs" value="${esc(gsUrl())}" placeholder="https://script.google.com/macros/s/..../exec" style="direction:ltr;text-align:left">
  <br><br><button class="btn" onclick="saveSettings()">💾 שמור ובדוק חיבור</button>
  <button class="btn sec" style="margin-inline-start:8px" onclick="localStorage.removeItem('shivuk_auth');location.reload()">🚪 יציאה</button>
  <br><br><p class="note">ההגדרה נשמרת במכשיר הזה. יש להזין אותה פעם אחת בכל מכשיר (טלפון/מחשב).</p></div>`;
}
async function saveSettings(){
  const u=$('#set-gs').value.trim();
  if(!u){ toast('נא להדביק כתובת'); return; }
  localStorage.setItem('shivuk_gs',u);
  try{
    const r=await apiGet({action:'ping'});
    if(r.ok){ toast('מחובר בהצלחה ✔'); await loadAll(); nav('home'); }
    else throw 0;
  }catch(e){ toast('לא הצלחתי להתחבר — בדוק את הכתובת'); setSync('err'); }
}

/* ================= INIT ================= */
// הגדרה בלחיצה אחת: קישור עם ‎#gs=<כתובת>‎ שומר את כתובת השרת במכשיר ומנקה את הקישור
(function(){
  const m = location.hash.match(/[#&]gs=([^&]+)/);
  if(m){ localStorage.setItem('shivuk_gs', decodeURIComponent(m[1])); history.replaceState(null,'',location.pathname); }
})();
if(localStorage.getItem('shivuk_auth')==='1') boot();
</script>
</body>
